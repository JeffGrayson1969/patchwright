line-length = 100
target-version = "py312"
src = ["src", "tests"]

[lint]
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "UP",     # pyupgrade
    "RUF",    # ruff-specific
    "SIM",    # flake8-simplify
    "PL",     # pylint subset
]
ignore = [
    "PLR0913",  # too many args (Pydantic models trip this trivially)
    "PLR2004",  # magic numbers (tests use literals on purpose)
]

[lint.per-file-ignores]
"tests/*" = ["PLR2004", "S101"]

# Fixture corpus is intentionally vulnerable / imperfect code; the codemod
# operates on it. Don't lint it.
"tests/fixtures/patch_corpus/**" = ["ALL"]

[lint.extend-per-file-ignores]
# Generated expected.py outputs include intentional code-smells (e.g. unused
# pickle import in the cwe502 fixture per its plan rationale).
"tests/fixtures/patch_corpus/*/expected.py" = ["ALL"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
